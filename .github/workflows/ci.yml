name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TURBO_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        continue-on-error: true
        run: npm run lint

      - name: Test
        run: npm test

      - name: Coverage (engine)
        if: success()
        continue-on-error: true
        run: npm run test:coverage --workspace=@workspace/engine

      - name: Upload coverage artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: engine-coverage
          path: packages/engine/coverage
          retention-days: 7
          if-no-files-found: ignore
